<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creartor — WebAR Viewer</title>
<meta name="description" content="Upload, preview, dan tampilkan model 3D dalam Augmented Reality.">

<!-- Favicon & app icons -->
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#08090c">

<!-- Fonts: Syne (display) · Hanken Grotesk (UI) · Space Mono (labels) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<!-- 3D / AR engine + QR generator -->
<script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="scene"></div>
<div class="grain"></div>

<div class="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2 4 6.5v9L12 22l8-6.5v-9L12 2Z" stroke="#d4ff3f" stroke-width="1.4" stroke-linejoin="round"/>
          <path d="M4 6.5 12 11l8-4.5M12 11v11" stroke="#d4ff3f" stroke-width="1.4" stroke-linejoin="round" opacity=".55"/>
        </svg>
      </div>
      <div class="wordmark">
        <b>Creartor</b>
        <span>WebAR Viewer</span>
      </div>
    </div>
    <div class="status" id="status">
      <span class="dot"></span><span id="statusText">No model</span>
    </div>
  </header>

  <!-- STAGE -->
  <main class="stage">
    <div class="viewport" id="drop">
      <div class="frame" aria-hidden="true"><i></i><i></i><i></i><i></i></div>
      <div class="badges">
        <span class="badge" id="badgeGlb">GLB · —</span>
        <span class="badge" id="badgeUsdz">USDZ · —</span>
      </div>

      <model-viewer id="viewer"
        camera-controls auto-rotate
        ar ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1" exposure="1"
        environment-image="neutral"
        interaction-prompt="none">
      </model-viewer>

      <div class="empty" id="empty">
        <div class="orb" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 3 3 8v8l9 5 9-5V8l-9-5Z" stroke="#d4ff3f" stroke-width="1.3" stroke-linejoin="round"/>
            <path d="M3 8l9 5 9-5M12 13v8" stroke="#d4ff3f" stroke-width="1.3" opacity=".5" stroke-linejoin="round"/>
          </svg>
        </div>
        <h2>Drop a 3D model to begin</h2>
        <p>Tarik &amp; lepas file <kbd>.glb</kbd> di sini, atau gunakan tombol di bawah. Tambahkan <kbd>.usdz</kbd> untuk AR di perangkat iOS.</p>
      </div>
    </div>
  </main>

  <!-- DOCK -->
  <div class="dock-wrap">
    <div class="dock">
      <label class="btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L8 8m4-4 4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Upload GLB<span class="sub">android · web</span></span>
        <input type="file" id="glbInput" accept=".glb,model/gltf-binary">
      </label>

      <label class="btn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 16V4m0 0L8 8m4-4 4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Upload USDZ<span class="sub">apple · ios</span></span>
        <input type="file" id="usdzInput" accept=".usdz,model/vnd.usdz+zip">
      </label>

      <div class="sep"></div>

      <button class="btn btn-primary" id="arBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M3 8V6a2 2 0 0 1 2-2h2M17 4h2a2 2 0 0 1 2 2v2M21 16v2a2 2 0 0 1-2 2h-2M7 20H5a2 2 0 0 1-2-2v-2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/><path d="M12 9 8.5 11v4L12 17l3.5-2v-4L12 9Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        View in AR
      </button>

      <button class="btn" id="shareBtn" disabled>
        <svg viewBox="0 0 24 24" fill="none"><path d="M16 8a3 3 0 1 0-2.83-4M8 12a3 3 0 1 0 0 .01M16 16a3 3 0 1 0-2.83 4M8.6 13.5l6.8 3.9M15.4 6.6 8.6 10.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Share
      </button>
    </div>
  </div>
</div>

<!-- SHARE MODAL -->
<div class="modal" id="modal">
  <div class="card">
    <button class="close" id="closeModal" aria-label="Tutup">✕</button>
    <h3>Scan to view in AR</h3>
    <p>Buka link ini di ponsel untuk menampilkan model dalam Augmented Reality.</p>
    <div class="qr"><canvas id="qr"></canvas></div>
    <div class="linkrow">
      <input id="shareLink" readonly value="">
      <button class="copy" id="copyBtn">Copy</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Tersalin ✓</div>

<script>
  const viewer   = document.getElementById('viewer');
  const empty    = document.getElementById('empty');
  const drop     = document.getElementById('drop');
  const arBtn    = document.getElementById('arBtn');
  const shareBtn = document.getElementById('shareBtn');
  const status   = document.getElementById('status');
  const statusTx = document.getElementById('statusText');
  const badgeGlb = document.getElementById('badgeGlb');
  const badgeUsdz= document.getElementById('badgeUsdz');

  const fmtSize = b => b < 1048576 ? (b/1024).toFixed(0)+' KB' : (b/1048576).toFixed(1)+' MB';

  function loadGlb(file){
    viewer.src = URL.createObjectURL(file);
    empty.classList.add('hide');
    arBtn.disabled = false; shareBtn.disabled = false;
    status.classList.add('live'); statusTx.textContent = file.name.slice(0,18);
    badgeGlb.textContent = 'GLB · ' + fmtSize(file.size);
    badgeGlb.classList.add('on');
  }
  function loadUsdz(file){
    viewer.setAttribute('ios-src', URL.createObjectURL(file));
    badgeUsdz.textContent = 'USDZ · ' + fmtSize(file.size);
    badgeUsdz.classList.add('on');
    shareBtn.disabled = false;
  }
  function route(file){
    const n = file.name.toLowerCase();
    if(n.endsWith('.glb') || n.endsWith('.gltf')) loadGlb(file);
    else if(n.endsWith('.usdz')) loadUsdz(file);
    else flash('Format tidak didukung');
  }

  document.getElementById('glbInput').onchange  = e => e.target.files[0] && loadGlb(e.target.files[0]);
  document.getElementById('usdzInput').onchange = e => e.target.files[0] && loadUsdz(e.target.files[0]);

  // Drag & drop
  ['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e=>{e.preventDefault(); drop.classList.add('drag')}));
  ['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e=>{e.preventDefault(); if(ev==='drop'||!drop.contains(e.relatedTarget)) drop.classList.remove('drag')}));
  drop.addEventListener('drop', e => { if(e.dataTransfer.files[0]) route(e.dataTransfer.files[0]); });

  // AR
  arBtn.onclick = () => { if(viewer.canActivateAR) viewer.activateAR(); else flash('AR didukung di perangkat mobile'); };

  // Share + QR
  const modal = document.getElementById('modal');
  const qr = new QRious({ element: document.getElementById('qr'), size: 320, value: location.href, background:'#fff', foreground:'#0a0a0a' });
  shareBtn.onclick = () => {
    document.getElementById('shareLink').value = location.href;
    qr.value = location.href;
    modal.classList.add('show');
  };
  document.getElementById('closeModal').onclick = () => modal.classList.remove('show');
  modal.addEventListener('click', e => { if(e.target===modal) modal.classList.remove('show'); });
  document.getElementById('copyBtn').onclick = () => navigator.clipboard.writeText(location.href).then(()=>flash('Tersalin ✓'));

  // Toast
  const toast = document.getElementById('toast'); let t;
  function flash(msg){ toast.textContent = msg; toast.classList.add('show'); clearTimeout(t); t=setTimeout(()=>toast.classList.remove('show'),1800); }
</script>
</body>
</html>
